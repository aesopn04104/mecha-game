<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mecha Game</title>
<link rel="stylesheet" href="style.css?v=20260427-3">
</head>
<body>

<h1>邊境機甲戰爭：戰鬥原型</h1>

<div id="status">
  <div class="unit">
    <h2>玩家機體</h2>
    <div>HP：<span id="playerHp"></span></div>
    <div class="bar"><div id="playerHpBar" class="bar-inner player"></div></div>
    <div>狀態：<span id="playerState"></span></div>
    <div>資源：<span id="resources"></span></div>
  </div>

  <div class="unit">
    <h2>小隊狀態</h2>
    <div id="allyStatus"></div>
  </div>

  <div class="unit">
    <h2>敵方狀態</h2>
    <div id="enemyStatus"></div>
  </div>
</div>

<div id="log"></div>

<div id="actions">
<select id="targetSelect"></select>
<button onclick="attackSelectedTarget()">攻擊</button>
<button onclick="defend()">防禦</button>
<button onclick="observe()">觀察</button>
<button onclick="goToBase()">撤回基地</button>
</div>

<div id="baseActions" style="display:none;">
<button onclick="repairMech()">維修</button>
<button onclick="restPilot()">休息</button>
<button onclick="openRecruit()">招募隊友</button>
<button onclick="openTeam()">上陣設定</button>
<button onclick="startNextMission()">出擊</button>
</div>

<div id="recruitPanel" style="display:none;"></div>
<div id="teamPanel" style="display:none;"></div>

<script src="data.js?v=20260427-3"></script>
<script src="combat.js?v=20260427-3"></script>
<script src="main.js?v=20260427-3"></script>

</body>
</html>
